<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Neo-Pride Test</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#ddd;
      color:#111;
      margin:40px;
      line-height:1.6;
    }

    #content{
							
      max-width:1000px;
    }

    a{
      color:#6cf;
    }

    h1,h2,h3{
      color:#fff;
    }
  </style>

  <!-- Markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

								 

<div id="content">
Loading README.md ...
</div>

<script>
fetch('README.md')
  .then(response => response.text())
  .then(text => {

    // convert markdown -> html
    const html = marked.parse(text);

    document.getElementById('content').innerHTML = html;
  })
  .catch(error => {
    document.getElementById('content').innerHTML =
      '<pre>Error loading README.md\n\n' + error + '</pre>';
  });
</script>

</body>
</html>
